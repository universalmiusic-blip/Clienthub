<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Sympra — Portal para Freelancers</title>
    <meta name="description" content="Gestiona proyectos, clientes, facturas y archivos multimedia desde un solo lugar." />
    <meta name="theme-color" content="#0f0e0c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sympra" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- Open Graph -->
    <meta property="og:title" content="Sympra — Portal para Freelancers" />
    <meta property="og:description" content="Gestiona proyectos, clientes, facturas y archivos multimedia." />
    <meta property="og:url" content="https://sympra.app" />
    <meta property="og:type" content="website" />
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <!-- Apple touch icon -->
    <link rel="apple-touch-icon" href="/icon-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Sympra SW registered'))
            .catch(err => console.log('SW error:', err));
        });
      }
    </script>
  </body>
</html>
